name: Build MigDialer Pro APK

on:
  push:
    branches: [ main, master ]
    tags:     [ 'v*.*.*' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Download Gradle wrapper jar
        run: |
          mkdir -p gradle/wrapper
          curl -fsSL \
            "https://github.com/gradle/gradle/raw/v8.12.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar
          echo "Jar: $(wc -c < gradle/wrapper/gradle-wrapper.jar) bytes"

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*','**/*.gradle.kts','**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Show APK info
        run: |
          APK=app/build/outputs/apk/debug/app-debug.apk
          echo "Size: $(du -sh $APK | cut -f1)"

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: MigDialer-Pro-v1-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Signed Release (push a tag like v1.0.0) ─────────────────
      # Secrets needed: KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
      - name: Decode Keystore
        if: startsWith(github.ref, 'refs/tags/v')
        id: ks
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/migdialer.jks
            echo "available=true"  >> $GITHUB_OUTPUT
            echo "path=$RUNNER_TEMP/migdialer.jks" >> $GITHUB_OUTPUT
          else
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Release APK
        if: startsWith(github.ref, 'refs/tags/v') && steps.ks.outputs.available == 'true'
        run: ./gradlew assembleRelease --no-daemon
        env:
          KEYSTORE_FILE:     ${{ steps.ks.outputs.path }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "MigDialer Pro ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk
          body: |
            ## 📱 MigDialer Pro ${{ github.ref_name }}
            Requiere Android 12+ · 100% offline · sin publicidad
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
